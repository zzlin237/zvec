IndexCommon:
  IndexConfig: '{"use_id_map":false,"data_type":"DT_FP32","dimension":768,"index_type":"kHNSW","metric_type":"kCosine","quantizer_param":{"type":"kInt8"},"m":15}'
  IndexPath: /root/code/VectorDBBench/db/cohere-1m/0/dense.qindex.5.proxima
  TopK: 100 #指定返回topk，recall时多topk用逗号隔开，bench时会使用最大值
  QueryFile: /root/data/cohere/1m/cohere_test_vector_1m.1000.norm.txt
  QueryType: float #指定query向量类型，需要与索引类型一致（FP16索引使用float查询，内部会自动转换）
  QueryFirstSep: ";" #指定query第一分隔符，用于分割key和特征
  QuerySecondSep: " " #指定query第二分隔符，用于分割特征各维度
  GroundTruthFile: /root/data/cohere/1m/neighbors.txt

  RecallThreadCount: 16
  BenchThreadCount: 16  #指定bench并发数（召回并发直接使用cpu核数）
  BenchIterCount: 100000 #指定bench执行条目数，当query量较少时会对query重复使用
  CompareById: true
  LogLevel: info

QueryConfig:
  QueryParam: '{"index_type":"kHNSW","ef_search":180}'

